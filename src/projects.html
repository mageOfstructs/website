<body class="font-mono bg-neutral-950 m-0 text-stone-50">
  <template id="project-div">
    <style>
      @import url("output.css");
    </style>
    <div
      class="block border border-4 border-double rounded-sm border-lime-500 w-100 m-4 p-4 font-mono bg-neutral-950 m-0 text-stone-50 duration-500 hover:scale-[1.1]"
      style="overflow-wrap: anywhere">
      <h3 class="font-bold" id="project-heading"></h3>

  <div class="flex flex-wrap m-4">

    <project-div heading="ArduinoNetworking" href="https://github.com/mageOfStructs/arduinoNetworking"
      desc="Simple network stack implementation for Arduinos to send text msgs."></project-div>

      desc="FSM generator for EBNF files, meant to provide better autocompletion. Has a basic (and probably unusable) VSCode extension."></project-div>

      desc="young me tried simulating a linux system as much as he could here"></project-div>

  <pre id="tty">
